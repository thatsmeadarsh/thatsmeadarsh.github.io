    <script>
        var interleaveOffset = 0.5;

      var swiperOptions = {
        loop: true,
        speed: 1000,
        grabCursor: true,
        watchSlidesProgress: true,
        mousewheelControl: true,
        keyboardControl: true,
        navigation: {
          nextEl: ".swiper-button-next",
          prevEl: ".swiper-button-prev"
        },
        on: {
          progress: function() {
            var swiper = this;
            for (var i = 0; i < swiper.slides.length; i++) {
              var slideProgress = swiper.slides[i].progress;
              var innerOffset = swiper.width * interleaveOffset;
              var innerTranslate = slideProgress * innerOffset;
              swiper.slides[i].querySelector(".slide-inner").style.transform =
                "translate3d(" + innerTranslate + "px, 0, 0)";
            }      
          },
          touchStart: function() {
            var swiper = this;
            for (var i = 0; i < swiper.slides.length; i++) {
              swiper.slides[i].style.transition = "";
            }
          },
          setTransition: function(speed) {
            var swiper = this;
            for (var i = 0; i < swiper.slides.length; i++) {
              swiper.slides[i].style.transition = speed + "ms";
              swiper.slides[i].querySelector(".slide-inner").style.transition =
                speed + "ms";
            }
          }
        }
      };

      var swiper = new Swiper(".swiper-container", swiperOptions);


      const spaceId = 'tou0drc8pcuj';
const environmentId = 'master';
const accessToken = 'qPQNcwjAXRR2ljhdpYO-mcN8VayaEBVwCusGEyLHsqk';
const tagId = 'serviceItem';
var data1 = '';

const url = `https://cdn.contentful.com/spaces/${spaceId}/environments/${environmentId}/entries?access_token=${accessToken}&metadata.tags.sys.id[all]=${tagId}`;

fetch(url, {
    method: 'GET',
    headers: {
        'Content-Type': 'application/json'
    }
})
.then(response => response.json())
.then(data => {
  console.log('Data:', data);
  data1 = data;
  const services = [];
  data.items.forEach(item => {
    const assetId = item.fields.serviceIcon.sys.id;
    const assetUrl = findAssetUrlById(assetId);
    const service = {
      assetId: assetId,
      assetUrl: 'https:'+assetUrl,
      serviceHeading: item.fields.serviceHeading,
      serviceDescription: item.fields.serviceDescription.content[0].content[0].value
    };
    services.push(service);
  });
  console.log('Services:', services);
  const servicesContainer = document.querySelector('.services .container .row');
  services.forEach(service => {
    const serviceItem = document.createElement('div');
    serviceItem.classList.add('col-lg-6');
    serviceItem.innerHTML = `
      <div class="service-item">
        <img src="${service.assetUrl}" alt="">
        <h4>${service.serviceHeading}</h4>
        <p>${service.serviceDescription}</p>
      </div>
    `;
    servicesContainer.appendChild(serviceItem);
  });

  services.forEach(service => {
    console.log('Service:', service);
  });
})
.catch(error => {
    console.error('Error:', error);
});


// Function to find the asset URL by ID
function findAssetUrlById(assetId) {
  const assets = data1.includes.Asset;
  for (let asset of assets) {
    if (asset.sys.id === assetId) {
      return asset.fields.file.url;
    }
  }
  return null;
}
